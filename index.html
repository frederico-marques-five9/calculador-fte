<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FTE Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .calculator {
      background: #ffffff;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }

    .results {
      margin-top: 20px;
      padding: 15px;
      background: #eef3f7;
      border-radius: 6px;
    }

    .results p {
      margin: 6px 0;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea3;
    }
  </style>
</head>
<body>

<div class="calculator">
  <h1>FTE Calculator</h1>

  <label># of Resources</label>
  <input type="number" id="resources" value="10">

  <label># of Vacation Days (All Team)</label>
  <input type="number" id="vacations" value="10">

  <label># of Holidays</label>
  <input type="number" id="holidays" value="2">

  <label># of Absence Days (All Team)</label>
  <input type="number" id="absences" value="30">

  <button onclick="calculateFTE()">Calculate</button>

  <div class="results">
    <p><strong>Gross Quarterly Hours:</strong> <span id="grossHours">0</span></p>
    <p><strong>Total Non‑Working Hours:</strong> <span id="nonWorking">0</span></p>
    <p><strong>Net Available Hours:</strong> <span id="netHours">0</span></p>
    <p><strong>Total FTE:</strong> <span id="fte">0</span></p>
  </div>
</div>

<script>
function calculateFTE() {
  const resources = Number(document.getElementById("resources").value);
  const vacations = Number(document.getElementById("vacations").value);
  const holidays = Number(document.getElementById("holidays").value);
  const absences = Number(document.getElementById("absences").value);

  const HOURS_PER_DAY = 8;
  const QUARTER_HOURS_PER_PERSON = 480;

  const grossHours = resources * QUARTER_HOURS_PER_PERSON;

  const vacationHours = vacations * HOURS_PER_DAY;
  const holidayHours = holidays * HOURS_PER_DAY;
  const absenceHours = absences * HOURS_PER_DAY;

  const nonWorkingHours = vacationHours + holidayHours + absenceHours;
  const netHours = grossHours - nonWorkingHours;

  const fte = netHours / QUARTER_HOURS_PER_PERSON;

  document.getElementById("grossHours").textContent = grossHours;
  document.getElementById("nonWorking").textContent = nonWorkingHours;
  document.getElementById("netHours").textContent = netHours;
  document.getElementById("fte").textContent = fte.toFixed(2);
}

// Initial calculation on load
calculateFTE();
</script>

</body>
</html>
